<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="50%" stop-color="#9b7df7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b7df7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c6aef" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines in background -->
  <g opacity="0.06" stroke="#9b7df7" stroke-width="1">
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>

  <!-- Back card (shadow card) -->
  <rect x="168" y="148" width="210" height="150" rx="20" fill="url(#cardGrad)" stroke="#7c6aef" stroke-width="1.5" stroke-opacity="0.4" transform="rotate(-6 256 256)"/>

  <!-- Main flashcard -->
  <rect x="136" y="170" width="240" height="172" rx="22" fill="url(#cardGrad)" stroke="url(#iconGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Card inner lines (representing text) -->
  <rect x="168" y="208" width="140" height="10" rx="5" fill="#9b7df7" opacity="0.5"/>
  <rect x="168" y="228" width="100" height="8" rx="4" fill="#9b7df7" opacity="0.25"/>
  <rect x="168" y="246" width="120" height="8" rx="4" fill="#9b7df7" opacity="0.2"/>

  <!-- Neural spark / lightning bolt overlay -->
  <g filter="url(#softglow)">
    <path d="M 290 193 L 264 258 L 282 258 L 256 323 L 318 240 L 296 240 L 326 193 Z"
          fill="url(#iconGrad)" opacity="0.95"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="152" cy="186" r="5" fill="#7c6aef" opacity="0.6"/>
  <circle cx="360" cy="186" r="5" fill="#c084fc" opacity="0.6"/>
  <circle cx="152" cy="326" r="5" fill="#c084fc" opacity="0.6"/>
  <circle cx="360" cy="326" r="5" fill="#7c6aef" opacity="0.6"/>

  <!-- Top glow orb -->
  <circle cx="256" cy="256" r="130" fill="#7c6aef" opacity="0.04"/>
</svg>
